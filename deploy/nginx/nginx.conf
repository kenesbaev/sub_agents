user nginx;
worker_processes auto;
pid /tmp/nginx.pid;

error_log /dev/stderr warn;

events {
    worker_connections 2048;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Never log query strings: OAuth callbacks contain short-lived code/state
    # values. The normalized path is logged instead of the raw request target.
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request_method $uri $server_protocol" '
                    '$status $body_bytes_sent '
                    '"$http_user_agent" request_id=$request_id '
                    'upstream=$upstream_addr upstream_time=$upstream_response_time';
    access_log /dev/stdout main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    server_tokens off;

    client_body_temp_path /tmp/client_temp;
    proxy_temp_path /tmp/proxy_temp;
    client_max_body_size 32m;
    client_body_timeout 30s;
    client_header_timeout 15s;
    send_timeout 60s;
    limit_req_status 429;
    limit_conn_status 429;

    # Nginx binds only to host loopback. The trusted TLS edge MUST overwrite
    # X-Forwarded-For with one canonical client IP; malformed/multiple values
    # fall back to the immediate peer instead of becoming spoofable keys.
    map $http_x_forwarded_for $edge_client_ip {
        default $remote_addr;
        "~^\s*(?<forwarded_client_ip>(?:[0-9]{1,3}\.){3}[0-9]{1,3}|[0-9A-Fa-f:]+)\s*$" $forwarded_client_ip;
    }
    map "$request_method:$uri" $auth_limit_key {
        default "";
        ~^POST:/api/auth/(?:register|login|google)$ $edge_client_ip;
    }
    limit_req_zone $edge_client_ip zone=api_per_ip:10m rate=10r/s;
    limit_req_zone $edge_client_ip zone=agent_per_ip:10m rate=30r/m;
    limit_req_zone $auth_limit_key zone=auth_per_ip:10m rate=10r/m;
    limit_conn_zone $edge_client_ip zone=connections_per_ip:10m;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # Preserve HTTPS when TLS terminates at an upstream load balancer. HSTS is
    # emitted only for requests the load balancer marked as HTTPS.
    map $http_x_forwarded_proto $external_scheme {
        default $scheme;
        ~*^https$ https;
    }

    map $external_scheme $hsts_header {
        default '';
        https 'max-age=31536000; includeSubDomains';
    }

    resolver 127.0.0.11 valid=10s ipv6=off;

    upstream frontend_upstream {
        zone frontend_upstream 64k;
        server frontend:3000 resolve;
        keepalive 32;
    }

    upstream backend_upstream {
        zone backend_upstream 64k;
        server backend:8000 resolve;
        keepalive 32;
    }

    upstream agent_upstream {
        zone agent_upstream 64k;
        server agent:4173 resolve;
        keepalive 16;
    }

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), geolocation=(), microphone=()" always;
        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self'; font-src 'self' data:; img-src 'self' data: blob: https:; media-src 'self' blob: https:; worker-src 'self' blob:; frame-src 'self'" always;
        add_header Strict-Transport-Security $hsts_header always;

        location = /nginx-health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 'ok\n';
        }

        # Readiness diagnostics stay on the private Docker network.
        location = /api/agents/healthz { return 404; }
        location = /api/agents/readyz { return 404; }

        # No host port is published for the agent. This prefix is its only
        # browser-facing path and keeps the UI on the public origin.
        location ^~ /api/agents/ {
            limit_req zone=agent_per_ip burst=10 nodelay;
            limit_conn connections_per_ip 8;
            proxy_pass http://agent_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $edge_client_ip;
            proxy_set_header X-Forwarded-For $edge_client_ip;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $external_scheme;
            proxy_set_header X-Request-ID $request_id;
            # A browser must never be able to impersonate a trusted service.
            proxy_set_header X-Agent-Internal-Token "";
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_connect_timeout 5s;
            proxy_send_timeout 180s;
            proxy_read_timeout 180s;
            proxy_buffering off;
            # Buffer and validate the complete request before consuming one of
            # the Agent service's scarce AI execution slots. This also turns
            # HTTP/2/chunked uploads into a bounded upstream request body.
            proxy_request_buffering on;
        }

        location ^~ /api/ {
            limit_req zone=api_per_ip burst=40 nodelay;
            limit_req zone=auth_per_ip burst=5 nodelay;
            limit_conn connections_per_ip 32;
            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $edge_client_ip;
            proxy_set_header X-Forwarded-For $edge_client_ip;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $external_scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_connect_timeout 5s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        location ^~ /_next/static/ {
            proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $edge_client_ip;
            proxy_set_header X-Forwarded-Proto $external_scheme;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location / {
            proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $edge_client_ip;
            proxy_set_header X-Forwarded-For $edge_client_ip;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $external_scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}
