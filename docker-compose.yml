services:
  postgres:
    image: postgres:16-alpine
    container_name: rebly-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rebly
      POSTGRES_PASSWORD: rebly
      POSTGRES_DB: rebly_ai
    ports:
      - "5432:5432"
    volumes:
      - rebly-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rebly -d rebly_ai"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  rebly-postgres-data:

