name: Production gate

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install Python dependencies
        run: python -m pip install -r backend/requirements.txt pytest pyflakes==3.4.0
      - name: Compile Python sources
        run: python -m compileall -q agent_server.py backend/app kaliya-core/src
      - name: Check undefined names and unused imports
        run: python -m pyflakes agent_server.py backend/app kaliya-core/src
      - name: Run Python tests
        env:
          APP_ENV: test
          PYTHONPATH: backend:kaliya-core/src
        run: python -m pytest -q tests backend/tests

  postgres-migrations:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: teamora
          POSTGRES_PASSWORD: teamora-ci-password
          POSTGRES_DB: teamora_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U teamora -d teamora_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      APP_ENV: test
      DATABASE_URL: postgresql+psycopg://teamora:teamora-ci-password@127.0.0.1:5432/teamora_ci
      PYTHONPATH: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: python -m pip install -r backend/requirements.txt
      - name: Apply migrations to empty PostgreSQL
        working-directory: backend
        run: alembic upgrade head
      - name: Verify migration model and readiness
        working-directory: backend
        run: |
          alembic check
          python -c "from app.db.session import engine; from app.health import readiness_report; ready, report = readiness_report(engine); assert ready, report"

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - name: Build production frontend
        env:
          BACKEND_INTERNAL_URL: http://backend:8000
          AGENT_INTERNAL_URL: http://agent:4173
        run: npm run build
      - name: Verify self-hosted Office runtime assets
        run: |
          test -s public/office/vendor/three/three.module.min.js
          test -s public/office/vendor/three/examples/jsm/controls/OrbitControls.js
          test -s public/office/vendor/three/examples/jsm/loaders/GLTFLoader.js
          ! grep -R "https://esm.sh" public/office

  infrastructure:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate production environment template
        run: python deploy/check_env.py deploy/production.env.example --template
      - name: Validate Docker Compose model
        env:
          PRODUCTION_ENV_FILE: deploy/production.env.example
        run: docker compose --env-file deploy/production.env.example -f compose.production.yml config --quiet
      - name: Validate deployment shell scripts
        run: bash -n deploy/scripts/*.sh
      - name: Validate Nginx syntax
        run: docker run --rm -v "$PWD/deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro" nginx:stable-alpine nginx -t

  container-builds:
    needs: [python-tests, postgres-migrations, frontend, infrastructure]
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            dockerfile: backend/Dockerfile
            build_args: ""
          - name: agent
            dockerfile: Dockerfile.agent
            build_args: ""
          - name: frontend
            dockerfile: frontend/Dockerfile
            build_args: |
              BACKEND_INTERNAL_URL=http://backend:8000
              AGENT_INTERNAL_URL=http://agent:4173
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          build-args: ${{ matrix.build_args }}
          push: false
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
